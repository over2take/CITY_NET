name: CI Tests

on:
  # Runs tests whenever someone opens or updates a Pull Request targeting 'main'
  pull_request:
    branches:
      - main
  
  # Runs tests when code is merged or pushed directly to 'main'
  push:
    branches:
      - main

jobs:
  validate-docker-config:
    name: Docker Config Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Dockerfile sets ENV DB_PATH
        run: grep -q "ENV DB_PATH=/app/data/city.db" Dockerfile.backend

      - name: Dockerfile creates /app/data at build time
        run: grep -q "mkdir -p" Dockerfile.backend

      - name: .dockerignore excludes backend/data/
        run: grep -qx "backend/data/" .dockerignore

      - name: .dockerignore excludes backend/uploads/
        run: grep -q "backend/uploads" .dockerignore

  test-backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './backend/package-lock.json'

      - name: Install Dependencies
        run: npm ci

      - name: Run Tests
        run: npm test

  test-frontend:
    name: Frontend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './frontend/package-lock.json'

      - name: Install Dependencies
        run: npm ci

      - name: Run Tests
        run: npm test

      - name: Build (type-check + bundle)
        run: npm run build
