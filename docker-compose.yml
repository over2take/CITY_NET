services:
  backend:
    image: over2take/citynet-backend:latest
    build:
      context: .
      dockerfile: Dockerfile.backend
    env_file:
      - ./backend/.env
    environment:
      - DB_PATH=/app/data/city.db
    volumes:
      - ./backend/data:/app/data
      - ./backend/uploads:/app/uploads
    restart: unless-stopped

  frontend:
    image: over2take/citynet-frontend:latest
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

  watchtower:
    image: containrrr/watchtower
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command: --interval 30
    restart: unless-stopped
