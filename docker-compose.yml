services:
  backend:
    image: over2take/citynet-backend:latest
    build:
      context: .
      dockerfile: Dockerfile.backend
    env_file:
      - ./backend/.env
    environment:
      - DB_PATH=/app/data/city.db
    user: root
    volumes:
      - ./backend/data:/app/data
      - ./backend/uploads:/app/uploads
      - /var/run/docker.sock:/var/run/docker.sock
      - ./docker-compose.yml:/app/docker-compose.yml:ro
      - ./backend/.env:/app/backend/.env:ro
    restart: unless-stopped

  frontend:
    image: over2take/citynet-frontend:latest
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "${APP_PORT:-80}:80"
    depends_on:
      - backend
    restart: unless-stopped

  # Watchtower disabled — GitHub Actions already pushes builds to Docker Hub
  # To update: docker compose pull && docker compose up -d
  # watchtower:
  #   image: containrrr/watchtower:latest
  #   volumes:
  #     - /var/run/docker.sock:/var/run/docker.sock
  #   environment:
  #     - WATCHTOWER_HTTP_API_TOKEN=${WATCHTOWER_API_TOKEN}
  #   command: --schedule "0 0 4 * * *" --http-api-update
  #   restart: unless-stopped

  # ── DuckDNS (optional) ──────────────────────────────────────────────────────
  # Keeps your DuckDNS subdomain pointing at your current public IP.
  # Requires DUCKDNS_SUBDOMAINS and DUCKDNS_TOKEN in backend/.env.
  # Remove or comment this service out if you're not using DuckDNS.
  duckdns:
    image: lscr.io/linuxserver/duckdns:latest
    env_file:
      - ./backend/.env
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=${TZ:-America/Chicago}
      - SUBDOMAINS=${DUCKDNS_SUBDOMAINS}
      - TOKEN=${DUCKDNS_TOKEN}
      - LOG_FILE=false
    restart: unless-stopped
