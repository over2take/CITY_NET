<svg xmlns="http://www.w3.org/2000/svg" width="400" height="300" viewBox="0 0 400 300">
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="400" height="300" fill="#0a0510"/>
  <rect x="8" y="8" width="384" height="284" fill="none" stroke="#ff2d78" stroke-width="4" rx="14" filter="url(#glow)"/>
  <!-- bowl -->
  <path d="M140 150 a60 38 0 0 0 120 0 z" fill="none" stroke="#ffcf3f" stroke-width="6" filter="url(#glow)"/>
  <line x1="150" y1="188" x2="250" y2="188" stroke="#ffcf3f" stroke-width="5" filter="url(#glow)"/>
  <!-- chopsticks -->
  <line x1="235" y1="90" x2="185" y2="145" stroke="#ffcf3f" stroke-width="5" filter="url(#glow)"/>
  <line x1="255" y1="98" x2="200" y2="148" stroke="#ffcf3f" stroke-width="5" filter="url(#glow)"/>
  <!-- steam -->
  <path d="M170 120 q-8 -14 0 -28 q8 -14 0 -26" fill="none" stroke="#5df2ff" stroke-width="4" filter="url(#glow)"/>
  <path d="M200 118 q-8 -14 0 -28 q8 -14 0 -26" fill="none" stroke="#5df2ff" stroke-width="4" filter="url(#glow)"/>
  <text x="200" y="250" text-anchor="middle" font-family="monospace" font-size="42" font-weight="bold" fill="#ff2d78" filter="url(#glow)">NOODLES</text>
</svg>
