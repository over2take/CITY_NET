<svg xmlns="http://www.w3.org/2000/svg" width="400" height="300" viewBox="0 0 400 300">
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="400" height="300" fill="#0a0800"/>
  <rect x="8" y="8" width="384" height="284" fill="none" stroke="#ffd23f" stroke-width="4" rx="14" filter="url(#glow)"/>
  <!-- credit chip -->
  <rect x="150" y="55" width="100" height="66" rx="8" fill="none" stroke="#a4ff4f" stroke-width="5" filter="url(#glow)"/>
  <line x1="150" y1="77" x2="250" y2="77" stroke="#a4ff4f" stroke-width="4" filter="url(#glow)"/>
  <circle cx="230" cy="102" r="9" fill="none" stroke="#a4ff4f" stroke-width="4" filter="url(#glow)"/>
  <text x="200" y="185" text-anchor="middle" font-family="monospace" font-size="46" font-weight="bold" fill="#ffd23f" filter="url(#glow)">PAWN</text>
  <text x="200" y="245" text-anchor="middle" font-family="monospace" font-size="30" font-weight="bold" fill="#ff7a2e" filter="url(#glow)">CASH 4 CHROME</text>
</svg>
